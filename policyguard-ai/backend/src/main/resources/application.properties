server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/policyguard_ai?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

app.upload.dir=${UPLOAD_DIR:./uploads}
app.jwt.secret=${JWT_SECRET:change-me-to-a-very-long-random-string-of-at-least-32-chars}
app.jwt.expiration-ms=86400000

app.ai.provider=${AI_PROVIDER:openai}
app.ai.openai.key=${OPENAI_API_KEY:}
app.ai.openai.model=gpt-4o-mini
app.ai.groq.key=${GROQ_API_KEY:}
app.ai.groq.model=llama-3.1-70b-versatile

app.cors.allowed-origins=http://localhost:5173